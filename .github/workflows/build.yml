name: Build Mobile App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Clone web assets from Flask repo
        run: |
          git clone --depth 1 https://github.com/WERLK/suanming.git /tmp/suanming-web
          export SUANMING_SOURCE=/tmp/suanming-web
          bash scripts/sync-assets.sh

      - name: Patch API URLs (Android — keep ads)
        run: node scripts/patch-api-urls.js --platform=android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone web assets from Flask repo
        run: |
          git clone --depth 1 https://github.com/WERLK/suanming.git /tmp/suanming-web
          export SUANMING_SOURCE=/tmp/suanming-web
          bash scripts/sync-assets.sh

      - name: Patch API URLs (iOS — remove ads)
        run: node scripts/patch-api-urls.js --platform=ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS (no signing — artifact only)
        working-directory: ios
        run: |
          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build \
            CODE_SIGNING_ALLOWED=NO
